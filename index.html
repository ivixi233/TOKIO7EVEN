<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Rating</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e293b,#0f172a);
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input, button{
    padding:10px;
    border-radius:8px;
    border:none;
    margin:5px 0;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.slider{
    width:100%;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #334155;
}

audio{
    width:200px;
}
.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>🎵 Music Leaderboard</h1>

<!-- LOGIN -->
<div id="loginBox" class="card">
<h2>Вход для оценки</h2>
<input type="text" id="login" placeholder="Логин"><br>
<input type="password" id="password" placeholder="Пароль"><br>
<button onclick="login()">Войти</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">

<div class="card">
<h2>Загрузить трек</h2>
<input type="text" id="trackName" placeholder="Название"><br>
<input type="text" id="artistName" placeholder="Исполнитель"><br>
<input type="file" id="audioFile" accept="audio/*"><br>
<button onclick="uploadTrack()">Загрузить</button>
</div>

<div class="card">
<h2>Оценка</h2>

<div id="ratingSection"></div>

<button onclick="submitRating()">Выставить оценку</button>
</div>

</div>

<!-- LEADERBOARD -->
<div class="card">
<h2>🏆 Лидерборд</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Трек</th>
<th>Исполнитель</th>
<th>Баллы</th>
<th>Прослушать</th>
</tr>
</thead>
<tbody id="leaderboard"></tbody>
</table>
</div>

</div>

<script>

let tracks = JSON.parse(localStorage.getItem("tracks")) || [];

const criteria = [
"Рифмы / Образы",
"Структура / Ритмика",
"Реализация стиля",
"Индивидуальность / Харизма",
"Атмосфера / Вайб",
"Подача"
];

function login(){
    const l = document.getElementById("login").value;
    const p = document.getElementById("password").value;

    if(l === "tokkkkioasd" && p === "FHJGYUDHGB"){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminPanel").classList.remove("hidden");
        renderRating();
    } else {
        alert("Неверные данные");
    }
}

function uploadTrack(){
    const name = document.getElementById("trackName").value;
    const artist = document.getElementById("artistName").value;
    const file = document.getElementById("audioFile").files[0];

    if(!name || !artist || !file) return alert("Заполни всё");

    const url = URL.createObjectURL(file);

    tracks.push({
        name,
        artist,
        url,
        score:0
    });

    localStorage.setItem("tracks", JSON.stringify(tracks));
    renderLeaderboard();
    alert("Трек добавлен");
}

function renderRating(){
    const container = document.getElementById("ratingSection");
    container.innerHTML = "";

    criteria.forEach((c,i)=>{
        container.innerHTML += `
            <label>${c}</label>
            <input type="range" min="1" max="10" value="5" class="slider" id="crit${i}">
        `;
    });
}

function submitRating(){
    if(tracks.length === 0) return alert("Нет треков");

    let total = 0;

    criteria.forEach((c,i)=>{
        total += parseInt(document.getElementById("crit"+i).value);
    });

    tracks[tracks.length-1].score = total;
    localStorage.setItem("tracks", JSON.stringify(tracks));
    renderLeaderboard();
    alert("Оценка выставлена");
}

function renderLeaderboard(){
    const board = document.getElementById("leaderboard");
    board.innerHTML = "";

    tracks.sort((a,b)=>b.score - a.score);

    tracks.forEach((t,i)=>{
        board.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${t.name}</td>
            <td>${t.artist}</td>
            <td>${t.score}</td>
            <td><audio controls src="${t.url}"></audio></td>
        </tr>
        `;
    });
}

renderLeaderboard();

</script>

</body>
</html>
